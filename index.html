<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기업 연봉 분석</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-body: #0a0a0a; --bg-card: #141414; --bg-hover: #1a1a1a;
            --border: #2a2a2a; --text-main: #eee; --text-sub: #888;
            --primary: #ff6b35; --primary-light: rgba(255, 107, 53, 0.15);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; font-size: 28px; margin-bottom: 8px; }
        .source-link { text-align: center; margin-bottom: 20px; color: var(--text-sub); font-size: 13px; }
        .source-link a { color: var(--primary); text-decoration: none; }

        .search-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .search-box input { padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; flex: 1; min-width: 200px; background: var(--bg-body); color: var(--text-main); outline: none; }
        .search-box input:focus { border-color: var(--primary); }
        .search-box button { padding: 12px 24px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .search-box button:disabled { opacity: .4; cursor: not-allowed; }
        .checkbox-wrap { display: flex; align-items: center; gap: 8px; color: var(--text-sub); font-size: 14px; }
        .checkbox-wrap input { width: 18px; height: 18px; accent-color: var(--primary); }
        #dataStatus { color: var(--text-sub); font-size: 14px; }

        .loading { text-align: center; padding: 40px; color: var(--text-sub); }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 5px; }
        .results-count { font-size: 14px; color: var(--text-sub); }
        .results-count strong { color: var(--primary); font-size: 18px; }

        .company-list { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; max-height: 420px; overflow-y: auto; }
        .company-item { padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
        .company-item:hover { background: var(--bg-hover); }
        .company-item:last-child { border-bottom: none; }
        .company-name { font-weight: 600; font-size: 15px; }
        .company-meta { display: flex; gap: 16px; margin-top: 6px; font-size: 13px; color: var(--text-sub); }

        .detail-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: none; }
        .detail-panel.active { display: block; }
        .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        .detail-title { font-size: 22px; font-weight: 700; }
        .close-btn { background: var(--bg-hover); border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; cursor: pointer; color: var(--text-main); }

        .detail-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { padding: 20px; border-radius: 12px; color: #fff; }
        .stat-card.purple { background: linear-gradient(135deg,#667eea,#764ba2); }
        .stat-card.green { background: linear-gradient(135deg,#11998e,#38ef7d); }
        .stat-card.orange { background: linear-gradient(135deg,#f093fb,#f5576c); }
        .stat-card.blue { background: linear-gradient(135deg,#4facfe,#00f2fe); }
        .stat-label { font-size: 13px; opacity: .9; }
        .stat-value { font-size: 26px; font-weight: 700; margin-top: 4px; }
        .stat-unit { font-size: 13px; opacity: .8; }

        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(360px,1fr)); gap: 20px; margin-bottom: 24px; }
        .chart-container { background: var(--bg-hover); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
        .chart-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 10px 12px; text-align: center; border-bottom: 1px solid var(--border); }
        .data-table th { background: var(--bg-hover); font-weight: 600; }

        .no-data { text-align: center; padding: 40px; color: var(--text-sub); }
        .progress { width: 100%; height: 4px; background: var(--border); margin-top: 8px; border-radius: 2px; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width .2s; border-radius: 2px; }

        #loadingBarWrap { margin: 16px 0; }
        #loadingBarWrap .label { font-size: 13px; color: var(--text-sub); margin-bottom: 6px; }
        #loadingBarWrap .track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        #loadingBarWrap .track div { height: 100%; width: 0%; background: linear-gradient(90deg,var(--primary),#ff8a50); border-radius: 3px; transition: width .3s; }

        .pagination { display: flex; justify-content: center; gap: 6px; padding: 16px; flex-wrap: wrap; }
        .pagination button { padding: 6px 12px; background: var(--bg-card); color: var(--text-sub); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 13px; }
        .pagination button:hover { background: var(--bg-hover); color: var(--text-main); }
        .pagination button.on { background: var(--primary); border-color: var(--primary); color: #fff; }
        .pagination span.dot { padding: 6px 2px; color: #666; }

        @media (max-width:768px) { .charts-grid { grid-template-columns:1fr; } .search-box { flex-direction:column; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>기업 연봉 분석 시스템</h1>
        <div class="source-link">자료출처: <a href="https://www.data.go.kr/data/15083277/fileData.do" target="_blank">국가데이터포털</a></div>

        <div class="search-box">
            <input type="text" id="keyword" placeholder="회사명 검색 (예: 삼성전자)" autocomplete="off">
            <div class="checkbox-wrap">
                <input type="checkbox" id="includeAll">
                <label for="includeAll">300인 미만 포함</label>
            </div>
            <button type="button" id="searchBtn" disabled>검색</button>
            <span id="dataStatus">초기화 중...</span>
        </div>

        <div id="loadingBarWrap">
            <div class="label"><span id="loadLabel">데이터 로딩 중...</span></div>
            <div class="track"><div id="loadBar"></div></div>
        </div>

        <div class="results-header">
            <div class="results-count">검색 결과 <strong id="resultCount">0</strong>개</div>
        </div>

        <div class="company-list" id="companyList">
            <div class="no-data" id="initMsg">잠시만 기다려주세요...</div>
        </div>

        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <div class="detail-title" id="companyTitle">-</div>
                <button type="button" class="close-btn" id="closeBtn">닫기</button>
            </div>
            <div class="detail-stats">
                <div class="stat-card purple"><div class="stat-label">현재 직원수</div><div class="stat-value" id="statEmployees">-</div><div class="stat-unit">명</div></div>
                <div class="stat-card green"><div class="stat-label">평균 연봉 (추정)</div><div class="stat-value" id="statSalary">-</div><div class="stat-unit">만원</div></div>
                <div class="stat-card orange"><div class="stat-label">평균 월급 (추정)</div><div class="stat-value" id="statMonthly">-</div><div class="stat-unit">만원</div></div>
                <div class="stat-card blue"><div class="stat-label">고용 안정성</div><div class="stat-value" id="statStability">-</div></div>
            </div>
            <div class="charts-grid">
                <div class="chart-container"><div class="chart-title">직원수 추이</div><canvas id="employeeChart"></canvas></div>
                <div class="chart-container"><div class="chart-title">평균 연봉 추이 (추정)</div><canvas id="salaryChart"></canvas></div>
                <div class="chart-container"><div class="chart-title">신규 채용 vs 퇴사자</div><canvas id="hireChart"></canvas></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">월별 상세 데이터</div>
                <table class="data-table"><thead><tr><th>월</th><th>직원수</th><th>신규</th><th>상실</th><th>평균월급</th><th>평균연봉</th></tr></thead><tbody id="tableBody"></tbody></table>
            </div>
        </div>
    </div>

    <script>
    var MONTHS = ['202411','202412','202501','202502','202503','202504','202505','202506','202507','202508','202509','202510'];
    var MONTH_LABEL = { '202411':'24.11','202412':'24.12','202501':'25.01','202502':'25.02','202503':'25.03','202504':'25.04','202505':'25.05','202506':'25.06','202507':'25.07','202508':'25.08','202509':'25.09','202510':'25.10' };

    var allData = [];
    var idx = new Map();
    var detailCache = {};
    var empChart, salChart, hireChart;
    var curPage = 1;
    var debounce = null;
    var ready = false;
    var PAGE = 100;

    function q(id) { return document.getElementById(id); }

    // ---------- 로딩 ----------
    function loadChunk(p) {
        return new Promise(function(resolve) {
            var s = document.createElement('script');
            s.src = 'data/chunks/' + p + '.js';
            s.onload = s.onerror = resolve;
            document.head.appendChild(s);
        });
    }

    async function loadAll() {
        var MAP = self.__CM;
        if (!MAP) {
            // load MAP first
            await new Promise(function(resolve) {
                var s = document.createElement('script');
                s.src = 'data/chunks/M.js';
                s.onload = s.onerror = resolve;
                document.head.appendChild(s);
            });
            MAP = self.__CM;
        }
        if (!MAP) { fail('MAP 로드 실패'); return; }

        var keys = Object.keys(MAP);
        var total = keys.length;
        var loaded = 0;

        for (var i = 0; i < total; i++) {
            var k = keys[i];
            await loadChunk(k);
            loaded++;
            var pct = Math.round(loaded / total * 100);
            q('loadBar').style.width = pct + '%';
            q('loadLabel').textContent = '데이터 로딩 중... ' + loaded + '/' + total + ' (' + pct + '%)';
        }

        // merge all chunks
        var CD = self.__CD || {};
        var merged = [];
        var seen = new Set();
        for (var k in CD) {
            var arr = CD[k];
            for (var j = 0; j < arr.length; j++) {
                var row = arr[j];
                var key = row.n + '|' + row.b;
                if (seen.has(key)) continue;
                seen.add(key);
                merged.push(row);
                idx.set(key, row);
            }
        }
        allData = merged;

        ready = true;
        q('searchBtn').disabled = false;
        q('dataStatus').textContent = allData.length.toLocaleString() + '개사 로드 완료';
        q('loadingBarWrap').style.display = 'none';
        q('initMsg').textContent = '검색어를 입력하세요';
    }

    function fail(msg) {
        q('initMsg').textContent = msg || '데이터 로드 실패';
        q('dataStatus').textContent = '오류';
    }

    // ---------- 검색 ----------
    function doSearch() {
        if (!ready) { q('dataStatus').textContent = '로딩 중...'; return; }

        var kw = q('keyword').value.trim();
        var inclAll = q('includeAll').checked;

        if (!kw) {
            q('companyList').innerHTML = '<div class="no-data">검색어를 입력하세요</div>';
            q('resultCount').textContent = '0';
            return;
        }

        curPage = 1;
        q('companyList').innerHTML = '<div class="loading"><div class="spinner"></div>검색 중...</div>';

        setTimeout(function() {
            var lower = kw.toLowerCase();
            var results = [];
            var len = allData.length;
            for (var i = 0; i < len; i++) {
                var c = allData[i];
                if (c.n.toLowerCase().indexOf(lower) !== -1) {
                    if (!inclAll && (c.m202411_job_code || 0) < 300) continue;
                    results.push(c);
                }
            }
            showResults(results);
        }, 10);
    }

    function showResults(data) {
        var container = q('companyList');
        q('resultCount').textContent = data.length.toLocaleString();

        if (data.length === 0) {
            container.innerHTML = '<div class="no-data">검색 결과 없음</div>';
            return;
        }

        var start = (curPage - 1) * PAGE;
        var end = Math.min(start + PAGE, data.length);
        var page = data.slice(start, end);

        var frag = document.createDocumentFragment();
        for (var i = 0; i < page.length; i++) {
            var c = page[i];
            var div = document.createElement('div');
            div.className = 'company-item';
            div.innerHTML = '<div class="company-name">' + esc(c.n) + '</div><div class="company-meta"><span>' + ((c.m202411_job_code||0).toLocaleString()) + '명</span></div>';
            (function(row) {
                div.addEventListener('click', function() { showDetail(row.n, row.b, row.n+'|'+row.b); });
            })(c);
            frag.appendChild(div);
        }

        container.innerHTML = '';
        container.appendChild(frag);

        // pagination
        var totalPages = Math.ceil(data.length / PAGE);
        if (totalPages > 1) {
            var pd = document.createElement('div');
            pd.className = 'pagination';
            var items = [];
            for (var i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= curPage - 2 && i <= curPage + 2)) items.push(i);
                else if (items[items.length-1] !== '...') items.push('...');
            }
            for (var i = 0; i < items.length; i++) {
                var p = items[i];
                if (p === '...') { var sp = document.createElement('span'); sp.className = 'dot'; sp.textContent = '\u2026'; pd.appendChild(sp); }
                else {
                    var btn = document.createElement('button');
                    btn.textContent = p;
                    if (p === curPage) btn.className = 'on';
                    (function(pg) { btn.addEventListener('click', function() { curPage = pg; showResults(data); window.scrollTo({top:0,behavior:'smooth'}); }); })(p);
                    pd.appendChild(btn);
                }
            }
            container.appendChild(pd);
        }
    }

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ---------- 상세 ----------
    function showDetail(bizNo, name, key) {
        q('companyTitle').textContent = name;
        q('detailPanel').classList.add('active');

        var row = detailCache[key] || idx.get(key);
        if (!row) { q('companyTitle').textContent = name + ' (데이터 없음)'; return; }
        detailCache[key] = row;

        var monthly = [], totalH = 0, totalS = 0;
        for (var i = 0; i < MONTHS.length; i++) {
            var m = MONTHS[i];
            var jc = row['m' + m + '_job_code'] || 0;
            var as = row['m' + m + '_annual_salary'] || 0;
            var nh = row['m' + m + '_new_hires'] || 0;
            var sp = row['m' + m + '_separations'] || 0;
            var sal = calcSal(as, jc);
            totalH += nh; totalS += sp;
            monthly.push({ m: MONTH_LABEL[m], jc: jc, nh: nh, sp: sp, y: sal.y, mo: sal.m });
        }

        var last = monthly[monthly.length-1];
        q('statEmployees').textContent = last.jc ? last.jc.toLocaleString() : '-';
        q('statSalary').textContent = last.y ? Math.round(last.y/10000).toLocaleString() : '-';
        q('statMonthly').textContent = last.mo ? Math.round(last.mo/10000).toLocaleString() : '-';
        q('statStability').textContent = (totalH+totalS > 0 ? (totalH/(totalH+totalS)*5).toFixed(1) : '-') + ' / 5.0';

        drawCharts(monthly);
        drawTable(monthly);
        q('detailPanel').scrollIntoView({behavior:'smooth'});
    }

    function calcSal(as, jc) {
        if (!as || !jc) return {y:0,m:0};
        var pp = as / jc;
        var mo = (pp / 9) * 100;
        return {y: Math.round(mo*12), m: Math.round(mo)};
    }

    function drawCharts(monthly) {
        var labels = monthly.map(function(x){return x.m;});
        if (empChart) empChart.destroy();
        if (salChart) salChart.destroy();
        if (hireChart) hireChart.destroy();
        var opt = { responsive:true, maintainAspectRatio:true, plugins:{legend:{display:false}}, scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#888'}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#888'}}} };

        empChart = new Chart(q('employeeChart'), { type:'line', data:{labels:labels, datasets:[{label:'직원수',data:monthly.map(function(x){return x.jc;}),borderColor:'#ff6b35',backgroundColor:'rgba(255,107,53,0.1)',tension:.3,fill:true,pointRadius:3}]}, options:{...opt, scales:{...opt.scales, y:{...opt.scales.y, beginAtZero:false}}} });

        salChart = new Chart(q('salaryChart'), { type:'line', data:{labels:labels, datasets:[{label:'평균연봉(만원)',data:monthly.map(function(x){return x.y?Math.round(x.y/10000):0;}),borderColor:'#38ef7d',backgroundColor:'rgba(56,239,125,0.1)',tension:.3,fill:true,pointRadius:3}]}, options:{...opt, scales:{...opt.scales, y:{...opt.scales.y, beginAtZero:false}}} });

        hireChart = new Chart(q('hireChart'), { type:'bar', data:{labels:labels, datasets:[{label:'신규 채용',data:monthly.map(function(x){return x.nh;}),backgroundColor:'#11998e',borderRadius:4},{label:'퇴사자',data:monthly.map(function(x){return x.sp;}),backgroundColor:'#e63946',borderRadius:4}]}, options:{...opt, plugins:{legend:{display:true,position:'top',labels:{color:'#888'}}}, scales:{...opt.scales, y:{...opt.scales.y, beginAtZero:true}}} });
    }

    function drawTable(monthly) {
        var tbody = q('tableBody');
        tbody.innerHTML = monthly.slice().reverse().map(function(x) {
            var md = x.mo ? Math.round(x.mo/10000).toLocaleString()+'만원' : '-';
            var yd = x.y ? Math.round(x.y/10000).toLocaleString()+'만원' : '-';
            return '<tr><td>'+x.m+'</td><td>'+(x.jc?x.jc.toLocaleString():'-')+'</td><td style="color:#11998e">+'+(x.nh||0).toLocaleString()+'</td><td style="color:#e63946">-'+(x.sp||0).toLocaleString()+'</td><td>'+md+'</td><td>'+yd+'</td></tr>';
        }).join('');
    }

    function closeDetail() { q('detailPanel').classList.remove('active'); }

    // ---------- 이벤트 ----------
    q('searchBtn').addEventListener('click', function() { clearTimeout(debounce); doSearch(); });

    q('keyword').addEventListener('input', function() {
        clearTimeout(debounce);
        debounce = setTimeout(function() { if (q('keyword').value.trim()) doSearch(); }, 300);
    });

    q('keyword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { clearTimeout(debounce); doSearch(); }
    });

    q('closeBtn').addEventListener('click', closeDetail);
    q('detailPanel').addEventListener('click', function(e) { if (e.target === this) closeDetail(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDetail(); });

    // ---------- 시작 ----------
    loadAll();
    </script>
</body>
</html>
