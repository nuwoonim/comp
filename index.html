<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기업 연봉 분석 - 스트리밍 검색</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--card:#1a1a1a;--hover:#222;--bd:#333;--t:#eee;--ts:#888;--ac:#ff6b35}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--t);line-height:1.6}
.c{max-width:1200px;margin:0 auto;padding:20px}
h1{text-align:center;font-size:26px;margin-bottom:4px;color:var(--ac)}
.src{text-align:center;margin-bottom:20px;color:var(--ts);font-size:13px}
.src a{color:var(--ac);text-decoration:none}

.sb{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.sb input[type=text]{padding:10px 14px;border:1px solid var(--bd);border-radius:8px;font-size:15px;flex:1;min-width:180px;background:var(--bg);color:var(--t);outline:none}
.sb input[type=text]:focus{border-color:var(--ac)}
.sb button{padding:10px 22px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;white-space:nowrap}
.sb button:disabled{opacity:.4;cursor:not-allowed}
.cb{display:flex;align-items:center;gap:6px;color:var(--ts);font-size:13px;white-space:nowrap}
.cb input{width:16px;height:16px;accent-color:var(--ac)}
#st{color:var(--ts);font-size:13px;white-space:nowrap}

.ld{text-align:center;padding:40px;color:var(--ts)}
.sp{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:s .8s linear infinite;margin:0 auto 14px}
@keyframes s{to{transform:rotate(360deg)}}

.rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:0 4px}
.rc{font-size:14px;color:var(--ts)}
.rc strong{color:var(--ac);font-size:17px}

.cl{background:var(--card);border:1px solid var(--bd);border-radius:12px;margin-bottom:20px;max-height:500px;overflow-y:auto}
.ci{padding:13px 18px;border-bottom:1px solid var(--bd);cursor:pointer;transition:.1s}
.ci:hover{background:var(--hover)}
.ci:last-child{border-bottom:none}
.cn{font-weight:600;font-size:15px}
.cm{display:flex;gap:14px;margin-top:5px;font-size:13px;color:var(--ts)}

.nd{text-align:center;padding:40px;color:var(--ts);font-size:14px}

.pbw{margin:16px 0}
.pbw .l{font-size:13px;color:var(--ts);margin-bottom:5px}
.pbw .t{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.pbw .t div{height:100%;width:0%;background:linear-gradient(90deg,var(--ac),#ff8a50);border-radius:3px;transition:.3s}

.pg{display:flex;justify-content:center;gap:5px;padding:14px;flex-wrap:wrap}
.pg button{padding:5px 11px;background:var(--card);color:var(--ts);border:1px solid var(--bd);border-radius:4px;cursor:pointer;font-size:13px}
.pg button:hover{background:var(--hover);color:var(--t)}
.pg button.on{background:var(--ac);border-color:var(--ac);color:#fff}
.pg span.d{padding:5px 2px;color:#555;font-size:13px}

/* 상세 패널 */
.dp{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:22px;display:none;margin-bottom:20px}
.dp.on{display:block}
.dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:1px solid var(--bd);padding-bottom:14px}
.dt{font-size:21px;font-weight:700}
.cb2{background:var(--hover);border:1px solid var(--bd);padding:7px 14px;border-radius:6px;cursor:pointer;color:var(--t);font-size:13px}
.ds{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
.sc{padding:18px;border-radius:12px;color:#fff}
.sc.p1{background:linear-gradient(135deg,#667eea,#764ba2)}
.sc.p2{background:linear-gradient(135deg,#11998e,#38ef7d)}
.sc.p3{background:linear-gradient(135deg,#f093fb,#f5576c)}
.sc.p4{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.sl{font-size:13px;opacity:.9}
.sv{font-size:24px;font-weight:700;margin-top:3px}
.su{font-size:13px;opacity:.8}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:18px;margin-bottom:22px}
.cc{background:var(--hover);border:1px solid var(--bd);border-radius:12px;padding:14px}
.ct{font-size:14px;font-weight:600;margin-bottom:10px}
.wt{width:100%;border-collapse:collapse;font-size:13px}
.wt th,.wt td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--bd)}
.wt th{background:var(--hover);font-weight:600}

@media(max-width:768px){.cg{grid-template-columns:1fr}.sb{flex-direction:column}}
</style>
</head>
<body>
<div class="c">
<h1>기업 연봉 분석 시스템</h1>
<div class="src">자료출처: <a href="https://www.data.go.kr/data/15083277/fileData.do" target="_blank">국가데이터포털</a></div>

<div class="sb">
<input type="text" id="kw" placeholder="회사명 검색 (예: 삼성전자)" autocomplete="off">
<div class="cb"><input type="checkbox" id="ia"><label for="ia">300인 미만 포함</label></div>
<button type="button" id="sbtn">검색</button>
<span id="st">준비 완료</span>
</div>

<div class="pbw" id="pbw" style="display:none"><div class="l"><span id="ll"></span></div><div class="t"><div id="lbar"></div></div></div>

<div class="rh"><div class="rc">검색 결과 <strong id="rc">0</strong>개</div></div>
<div class="cl" id="cl"><div class="nd">검색어를 입력해주세요</div></div>

<div class="dp" id="dp">
<div class="dh"><div class="dt" id="ttl">-</div><button type="button" class="cb2" id="cbtn">닫기</button></div>
<div class="ds">
<div class="sc p1"><div class="sl">현재 직원수</div><div class="sv" id="se">-</div><div class="su">명</div></div>
<div class="sc p2"><div class="sl">평균 연봉 (추정)</div><div class="sv" id="ss">-</div><div class="su">만원</div></div>
<div class="sc p3"><div class="sl">평균 월급 (추정)</div><div class="sv" id="sm">-</div><div class="su">만원</div></div>
<div class="sc p4"><div class="sl">고용 안정성</div><div class="sv" id="sst">-</div></div>
</div>
<div class="cg">
<div class="cc"><div class="ct">직원수 추이</div><canvas id="ec"></canvas></div>
<div class="cc"><div class="ct">평균 연봉 추이 (추정)</div><canvas id="sc"></canvas></div>
<div class="cc"><div class="ct">신규 채용 vs 퇴사자</div><canvas id="hc"></canvas></div>
</div>
<div class="cc"><div class="ct">월별 상세 데이터</div>
<table class="wt"><thead><tr><th>월</th><th>직원수</th><th>신규</th><th>상실</th><th>평균월급</th><th>평균연봉</th></tr></thead><tbody id="tb"></tbody></table>
</div>
</div>
</div>

<script>
var MS = ['202411','202412','202501','202502','202503','202504','202505','202506','202507','202508','202509','202510'];
var ML = {'202411':'24.11','202412':'24.12','202501':'25.01','202502':'25.02','202503':'25.03','202504':'25.04','202505':'25.05','202506':'25.06','202507':'25.07','202508':'25.08','202509':'25.09','202510':'25.10'};

var AD = [], IX = new Map(), DC = {}, ready = false, cp = 1, db = null, PAGE = 100;
var ec, sc, hc;
var chartReady = false;
var headerLine = '';

function $(id){return document.getElementById(id)}

// === 첫 문자 추출 ===
function getFirstChar(str) {
    if (!str) return null;
    var ch = str[0];
    // 허용된 문자인지 확인
    var code = ch.charCodeAt(0);
    // 0-9
    if (code >= 48 && code <= 57) return ch;
    // a-z
    if (code >= 97 && code <= 122) return ch;
    // A-Z
    if (code >= 65 && code <= 90) return ch;
    // 가-하 (한글)
    if (code >= 44032 && code <= 55203) return ch;
    return null;
}

// === 스트리밍 파일 로드 및 검색 ===
function streamSearch(keyword, includeAll, callback) {
    var firstChar = getFirstChar(keyword);
    if (!firstChar) {
        callback(null, '지원하지 않는 문자로 시작합니다: ' + keyword[0]);
        return;
    }

    var fileName = 'data/split2/' + firstChar + '.csv';
    var results = [];
    var totalLines = 0;
    var matchedLines = 0;
    var lower = keyword.toLowerCase();
    var buffer = '';
    var headerParsed = false;
    var colIdx = {};
    var error = null;

    $('pbw').style.display = 'block';
    $('ll').textContent = firstChar + '.csv 파일 로딩 중...';
    $('lbar').style.width = '0%';

    fetch(fileName)
        .then(function(response) {
            if (!response.ok) throw new Error('파일 없음: ' + fileName);
            return response.body;
        })
        .then(function(body) {
            var reader = body.getReader();
            var decoder = new TextDecoder('utf-8');

            function readChunk() {
                reader.read().then(function(result) {
                    if (result.done) {
                        // 남은 버퍼 처리
                        if (buffer.trim()) {
                            processLine(buffer.trim());
                        }
                        $('pbw').style.display = 'none';
                        callback(results, null);
                        return;
                    }

                    buffer += decoder.decode(result.value, { stream: true });
                    var lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();
                        if (!line) continue;
                        totalLines++;

                        if (!headerParsed) {
                            // 헤더 파싱
                            headerLine = line;
                            var headers = line.split(',');
                            for (var h = 0; h < headers.length; h++) {
                                colIdx[headers[h].trim()] = h;
                            }
                            headerParsed = true;
                            continue;
                        }

                        processLine(line);
                    }

                    // 진행률 표시
                    var size = result.value.length;
                    var pct = Math.min(100, Math.round(totalLines / 8000 * 100));
                    $('lbar').style.width = pct + '%';
                    $('ll').textContent = firstChar + '.csv 검색 중... ' + totalLines + ' 라인 처리, ' + matchedLines + ' 매치';

                    readChunk();
                });
            }

            readChunk();
        })
        .catch(function(err) {
            $('pbw').style.display = 'none';
            callback(null, err.message);
        });

    function processLine(line) {
        var values = line.split(',');
        var nameIdx = colIdx['company_name'];
        if (nameIdx === undefined) return;

        var name = (values[nameIdx] || '').trim();
        if (!name) return;

        // LIKE '%keyword%' 검색
        if (name.toLowerCase().indexOf(lower) === -1) return;

        matchedLines++;

        // 300인 미만 필터
        var jobCodeIdx = colIdx['m202411_job_code'];
        var jobCode = jobCodeIdx !== undefined ? (parseInt(values[jobCodeIdx]) || 0) : 0;
        if (!includeAll && jobCode < 300) return;

        // 결과 객체 생성
        var row = { n: name, b: (values[colIdx['business_no']] || '').trim() };
        for (var m = 0; m < MS.length; m++) {
            var month = MS[m];
            row['m' + month + '_job_code'] = parseInt(values[colIdx['m' + month + '_job_code']] || '0') || 0;
            row['m' + month + '_annual_salary'] = parseInt(values[colIdx['m' + month + '_annual_salary']] || '0') || 0;
            row['m' + month + '_new_hires'] = parseInt(values[colIdx['m' + month + '_new_hires']] || '0') || 0;
            row['m' + month + '_separations'] = parseInt(values[colIdx['m' + month + '_separations']] || '0') || 0;
        }

        results.push(row);
    }
}

// === 검색 실행 ===
function doSearch() {
    var kw = $('kw').value.trim();
    var ia = $('ia').checked;

    if (!kw) {
        $('cl').innerHTML = '<div class="nd">검색어를 입력해주세요</div>';
        $('rc').textContent = '0';
        return;
    }

    $('cl').innerHTML = '<div class="ld"><div class="sp"></div>스트리밍 검색 중...</div>';
    $('st').textContent = '검색 중...';

    streamSearch(kw, ia, function(results, error) {
        if (error) {
            $('cl').innerHTML = '<div class="nd">오류: ' + esc(error) + '</div>';
            $('rc').textContent = '0';
            $('st').textContent = '오류';
            return;
        }

        if (!results || results.length === 0) {
            $('cl').innerHTML = '<div class="nd">검색 결과가 없습니다</div>';
            $('rc').textContent = '0';
            $('st').textContent = '결과 없음';
            return;
        }

        AD = results;
        // 인덱스 빌드
        IX.clear();
        for (var i = 0; i < AD.length; i++) {
            var r = AD[i];
            IX.set(r.n + '|' + r.b, r);
        }

        cp = 1;
        $('rc').textContent = results.length.toLocaleString();
        $('st').textContent = results.length.toLocaleString() + '개 매치';
        showResults(results);
    });
}

function showResults(data) {
    var container = $('cl');
    var start = (cp - 1) * PAGE;
    var end = Math.min(start + PAGE, data.length);
    var page = data.slice(start, end);

    var frag = document.createDocumentFragment();
    for (var i = 0; i < page.length; i++) {
        var c = page[i];
        var div = document.createElement('div');
        div.className = 'ci';
        div.innerHTML = '<div class="cn">' + esc(c.n) + '</div><div class="cm"><span>' + ((c.m202411_job_code || 0).toLocaleString()) + '명</span></div>';
        (function(row) {
            div.addEventListener('click', function() { showDetail(row); });
        })(c);
        frag.appendChild(div);
    }

    container.innerHTML = '';
    container.appendChild(frag);

    // pagination
    var totalPages = Math.ceil(data.length / PAGE);
    if (totalPages > 1) {
        var pd = document.createElement('div');
        pd.className = 'pg';
        var items = [];
        for (var i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= cp - 2 && i <= cp + 2)) items.push(i);
            else if (items[items.length - 1] !== '...') items.push('...');
        }
        items.forEach(function(p) {
            if (p === '...') { var sp = document.createElement('span'); sp.className = 'd'; sp.textContent = '\u2026'; pd.appendChild(sp); }
            else {
                var btn = document.createElement('button');
                btn.textContent = p;
                if (p === cp) btn.className = 'on';
                (function(pg) { btn.addEventListener('click', function() { cp = pg; showResults(data); window.scrollTo({ top: 0, behavior: 'smooth' }); }); })(p);
                pd.appendChild(btn);
            }
        });
        container.appendChild(pd);
    }
}

function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') }

// === 차트 JS 동적 로드 ===
function ensureChart(cb) {
    if (typeof Chart !== 'undefined') { cb(); return; }
    if (chartReady) { setTimeout(function() { ensureChart(cb); }, 100); return; }
    chartReady = true;
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
    s.onload = cb;
    s.onerror = function() { console.warn('Chart.js CDN fail'); cb(); };
    document.head.appendChild(s);
}

// === 상세 정보 ===
function showDetail(row) {
    var key = row.n + '|' + row.b;
    $('ttl').textContent = row.n;
    $('dp').classList.add('on');

    var r = DC[key] || IX.get(key);
    if (!r) { $('ttl').textContent = row.n + ' (데이터 없음)'; return; }
    DC[key] = r;

    var monthly = [], th = 0, ts = 0;
    for (var i = 0; i < MS.length; i++) {
        var m = MS[i], jc = r['m' + m + '_job_code'] || 0, as = r['m' + m + '_annual_salary'] || 0;
        var nh = r['m' + m + '_new_hires'] || 0, sp = r['m' + m + '_separations'] || 0;
        var sal = calcSal(as, jc);
        th += nh; ts += sp;
        monthly.push({ m: ML[m], jc: jc, nh: nh, sp: sp, y: sal.y, mo: sal.m });
    }

    var last = monthly[monthly.length - 1];
    $('se').textContent = last.jc ? last.jc.toLocaleString() : '-';
    $('ss').textContent = last.y ? Math.round(last.y / 10000).toLocaleString() : '-';
    $('sm').textContent = last.mo ? Math.round(last.mo / 10000).toLocaleString() : '-';
    $('sst').textContent = (th + ts > 0 ? (th / (th + ts) * 5).toFixed(1) : '-') + ' / 5.0';

    ensureChart(function() { drawCharts(monthly); });
    drawTable(monthly);
    $('dp').scrollIntoView({ behavior: 'smooth' });
}

function calcSal(as, jc) {
    if (!as || !jc) return { y: 0, m: 0 };
    var pp = as / jc, mo = (pp / 9) * 100;
    return { y: Math.round(mo * 12), m: Math.round(mo) };
}

function drawCharts(monthly) {
    var labels = monthly.map(function(x) { return x.m });
    if (ec) ec.destroy(); if (sc) sc.destroy(); if (hc) hc.destroy();
    if (typeof Chart === 'undefined') return;

    var opt = { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888' } }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888' } } } };

    ec = new Chart($('ec'), { type: 'line', data: { labels: labels, datasets: [{ label: '직원수', data: monthly.map(function(x) { return x.jc }), borderColor: '#ff6b35', backgroundColor: 'rgba(255,107,53,0.1)', tension: .3, fill: true, pointRadius: 3 }] }, options: { ...opt, scales: { ...opt.scales, y: { ...opt.scales.y, beginAtZero: false } } } });

    sc = new Chart($('sc'), { type: 'line', data: { labels: labels, datasets: [{ label: '연봉(만원)', data: monthly.map(function(x) { return x.y ? Math.round(x.y / 10000) : 0 }), borderColor: '#38ef7d', backgroundColor: 'rgba(56,239,125,0.1)', tension: .3, fill: true, pointRadius: 3 }] }, options: { ...opt, scales: { ...opt.scales, y: { ...opt.scales.y, beginAtZero: false } } } });

    hc = new Chart($('hc'), { type: 'bar', data: { labels: labels, datasets: [{ label: '신규', data: monthly.map(function(x) { return x.nh }), backgroundColor: '#11998e', borderRadius: 4 }, { label: '퇴사', data: monthly.map(function(x) { return x.sp }), backgroundColor: '#e63946', borderRadius: 4 }] }, options: { ...opt, plugins: { legend: { display: true, position: 'top', labels: { color: '#888' } } }, scales: { ...opt.scales, y: { ...opt.scales.y, beginAtZero: true } } } });
}

function drawTable(monthly) {
    $('tb').innerHTML = monthly.slice().reverse().map(function(x) {
        var md = x.mo ? Math.round(x.mo / 10000).toLocaleString() + '만원' : '-';
        var yd = x.y ? Math.round(x.y / 10000).toLocaleString() + '만원' : '-';
        return '<tr><td>' + x.m + '</td><td>' + (x.jc ? x.jc.toLocaleString() : '-') + '</td><td style="color:#11998e">+' + (x.nh || 0).toLocaleString() + '</td><td style="color:#e63946">-' + (x.sp || 0).toLocaleString() + '</td><td>' + md + '</td><td>' + yd + '</td></tr>';
    }).join('');
}

function closeD() { $('dp').classList.remove('on') }

// === 이벤트 ===
$('sbtn').addEventListener('click', function() { clearTimeout(db); doSearch(); });
$('kw').addEventListener('input', function() {
    clearTimeout(db);
    db = setTimeout(function() { if ($('kw').value.trim()) doSearch(); }, 300);
});
$('kw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { clearTimeout(db); doSearch(); }
});
$('cbtn').addEventListener('click', closeD);
$('dp').addEventListener('click', function(e) { if (e.target === this) closeD(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeD(); });
</script>
</body>
</html>
