<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기업 연봉 분석 - Asary</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="./data/companies.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-body: #0a0a0a;
            --bg-card: #141414;
            --bg-hover: #1a1a1a;
            --border: #2a2a2a;
            --text-main: #eee;
            --text-sub: #888;
            --primary: #ff6b35;
            --primary-light: rgba(255, 107, 53, 0.15);
            --green: #38ef7d;
            --blue: #4facfe;
            --red: #e63946;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-body); color: var(--text-main); min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { color: var(--text-main); margin-bottom: 8px; text-align: center; font-size: 28px; }
        .source-link { text-align: center; margin-bottom: 20px; color: var(--text-sub); font-size: 13px; }
        .source-link a { color: var(--primary); text-decoration: none; }

        .search-box { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .search-box input { padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; flex: 1; min-width: 200px; background: var(--bg-body); color: var(--text-main); outline: none; }
        .search-box input:focus { border-color: var(--primary); }
        .search-box button { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .search-box button:hover { opacity: 0.9; }
        .checkbox-wrap { display: flex; align-items: center; gap: 8px; color: var(--text-sub); font-size: 14px; }
        .checkbox-wrap input { width: 18px; height: 18px; accent-color: var(--primary); }

        .loading { text-align: center; padding: 40px; color: var(--text-sub); }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 5px; }
        .results-count { font-size: 14px; color: var(--text-sub); }
        .results-count strong { color: var(--primary); font-size: 18px; }

        .company-list { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; max-height: 400px; overflow-y: auto; }
        .company-item { padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
        .company-item:hover { background: var(--bg-hover); }
        .company-item:last-child { border-bottom: none; }
        .company-name { font-weight: 600; color: var(--text-main); font-size: 16px; }
        .company-meta { display: flex; gap: 20px; margin-top: 8px; font-size: 14px; color: var(--text-sub); }

        .detail-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: none; }
        .detail-panel.active { display: block; }
        .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        .detail-title { font-size: 24px; font-weight: 700; color: var(--text-main); }
        .close-btn { background: var(--bg-hover); border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; cursor: pointer; color: var(--text-main); }
        .close-btn:hover { background: var(--border); }

        .detail-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; }
        .stat-card.green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .stat-card.orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card.blue { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .stat-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
        .stat-unit { font-size: 14px; opacity: 0.8; }

        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .chart-container { background: var(--bg-hover); padding: 16px; border-radius: 12px; border: 1px solid var(--border); }
        .chart-title { font-size: 16px; font-weight: 600; color: var(--text-main); margin-bottom: 12px; }

        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border); color: var(--text-main); }
        .data-table th { background: var(--bg-hover); font-weight: 600; }
        .data-table tr:hover { background: var(--bg-hover); }

        .no-data { text-align: center; padding: 40px; color: var(--text-sub); }
        .progress { width: 100%; height: 4px; background: var(--border); margin-top: 8px; border-radius: 2px; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; border-radius: 2px; }

        .pagination { display: flex; justify-content: center; gap: 8px; padding: 20px; flex-wrap: wrap; }
        .page-btn { padding: 8px 12px; background: var(--bg-card); color: var(--text-sub); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
        .page-btn:hover { background: var(--bg-hover); color: var(--text-main); }
        .page-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

        #dataStatus { color: var(--text-sub); font-size: 14px; }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .search-box { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>기업 연봉 분석 시스템</h1>
        <div class="source-link">자료출처: <a href="https://www.data.go.kr/data/15083277/fileData.do" target="_blank">국가데이터포털</a></div>

        <div class="search-box">
            <input type="text" id="keyword" placeholder="회사명 검색 (예: 삼성전자)" autocomplete="off">
            <div class="checkbox-wrap">
                <input type="checkbox" id="includeAll">
                <label for="includeAll">300인 미만 기업 포함</label>
            </div>
            <button id="searchBtn">검색</button>
            <span id="dataStatus"></span>
        </div>

        <div class="results-header">
            <div class="results-count">검색 결과 <strong id="resultCount">0</strong>개</div>
        </div>

        <div class="company-list" id="companyList">
            <div class="loading">
                <div class="spinner"></div>
                데이터 로딩 중... <span id="progressText">0%</span>
                <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
            </div>
        </div>

        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <div class="detail-title" id="companyTitle">-</div>
                <button class="close-btn" id="closeBtn">닫기</button>
            </div>
            <div class="detail-stats">
                <div class="stat-card">
                    <div class="stat-label">현재 직원수</div>
                    <div class="stat-value" id="statEmployees">-</div>
                    <div class="stat-unit">명</div>
                </div>
                <div class="stat-card green">
                    <div class="stat-label">평균 연봉 (추정)</div>
                    <div class="stat-value" id="statSalary">-</div>
                    <div class="stat-unit">만원</div>
                </div>
                <div class="stat-card orange">
                    <div class="stat-label">평균 월급 (추정)</div>
                    <div class="stat-value" id="statMonthly">-</div>
                    <div class="stat-unit">만원</div>
                </div>
                <div class="stat-card blue">
                    <div class="stat-label">고용 안정성</div>
                    <div class="stat-value" id="statStability">-</div>
                </div>
            </div>
            <div class="charts-grid">
                <div class="chart-container">
                    <div class="chart-title">직원수 추이</div>
                    <canvas id="employeeChart"></canvas>
                </div>
                <div class="chart-container">
                    <div class="chart-title">평균 연봉 추이 (추정)</div>
                    <canvas id="salaryChart"></canvas>
                </div>
                <div class="chart-container">
                    <div class="chart-title">신규 채용 vs 퇴사자</div>
                    <canvas id="hireChart"></canvas>
                </div>
            </div>
            <div class="chart-container">
                <div class="chart-title">월별 상세 데이터</div>
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>월</th>
                            <th>직원수</th>
                            <th>신규</th>
                            <th>상실</th>
                            <th>평균월급</th>
                            <th>평균연봉</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const MONTHS = ['202411','202412','202501','202502','202503','202504','202505','202506','202507','202508','202509','202510'];
        const MONTH_LABELS = {
            '202411': '24년11월', '202412': '24년12월', '202501': '25년1월',
            '202502': '25년2월', '202503': '25년3월', '202504': '25년4월',
            '202505': '25년5월', '202506': '25년6월', '202507': '25년7월',
            '202508': '25년8월', '202509': '25년9월', '202510': '25년10월'
        };

        let allCompanies = [];
        let filteredCompanies = [];
        let companyIndex = new Map();
        let companyCache = {};
        let employeeChart, salaryChart, hireChart;
        let currentPage = 1;
        const PAGE_SIZE = 100;
        let searchDebounceTimer = null;
        let dataReady = false;

        function init() {
            const statusEl = document.getElementById('dataStatus');
            const progressText = document.getElementById('progressText');
            const progressBar = document.getElementById('progressBar');

            if (typeof COMPANIES_DATA === 'undefined') {
                document.getElementById('companyList').innerHTML = '<div class="error-msg"><h3>데이터 파일 로드 실패</h3><p>data/companies.js 파일을 확인해주세요.</p></div>';
                return;
            }

            setTimeout(() => {
                const total = COMPANIES_DATA.length;
                const seenKeys = new Set();

                for (let i = 0; i < total; i++) {
                    const row = COMPANIES_DATA[i];
                    const key = row.company_name + '|' + row.business_no;
                    if (seenKeys.has(key)) continue;
                    seenKeys.add(key);

                    allCompanies.push(row);
                    companyIndex.set(key, row);

                    if (i % 2000 === 0) {
                        const pct = Math.round((i / total) * 100);
                        if (progressText) progressText.textContent = pct + '%';
                        if (progressBar) progressBar.style.width = pct + '%';
                    }
                }

                if (progressText) progressText.textContent = '100%';
                if (progressBar) progressBar.style.width = '100%';

                dataReady = true;
                statusEl.textContent = allCompanies.length.toLocaleString() + '개사 로드됨';
                setTimeout(() => {
                    document.getElementById('companyList').innerHTML = '<div class="no-data">검색어를 입력해주세요</div>';
                }, 300);
            }, 50);
        }

        function performSearch() {
            const keyword = document.getElementById('keyword').value.trim();
            const includeAll = document.getElementById('includeAll').checked;

            if (!keyword) {
                document.getElementById('companyList').innerHTML = '<div class="no-data">검색어를 입력해주세요</div>';
                document.getElementById('resultCount').textContent = '0';
                return;
            }

            currentPage = 1;
            searchInMemory(keyword, includeAll);
        }

        function searchInMemory(keyword, includeAll) {
            const container = document.getElementById('companyList');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>검색 중...</div>';

            requestAnimationFrame(() => {
                const keywordLower = keyword.toLowerCase();
                const seenKeys = new Set();
                const results = [];
                const len = allCompanies.length;

                for (let i = 0; i < len; i++) {
                    const c = allCompanies[i];
                    if (c.company_name.toLowerCase().includes(keywordLower)) {
                        const jobCode = c.m202411_job_code || 0;
                        if (!includeAll && jobCode < 300) continue;
                        if (seenKeys.has(c.company_name + '|' + c.business_no)) continue;

                        seenKeys.add(c.company_name + '|' + c.business_no);
                        results.push(c);
                    }
                }

                filteredCompanies = results;
                renderSearchResults();
            });
        }

        function renderSearchResults() {
            const container = document.getElementById('companyList');
            const resultCount = document.getElementById('resultCount');

            if (filteredCompanies.length === 0) {
                container.innerHTML = '<div class="no-data">검색 결과가 없습니다</div>';
                resultCount.textContent = '0';
                return;
            }

            resultCount.textContent = filteredCompanies.length.toLocaleString();

            const start = (currentPage - 1) * PAGE_SIZE;
            const end = Math.min(start + PAGE_SIZE, filteredCompanies.length);
            const pageData = filteredCompanies.slice(start, end);

            const fragment = document.createDocumentFragment();

            for (let i = 0; i < pageData.length; i++) {
                const c = pageData[i];
                const div = document.createElement('div');
                div.className = 'company-item';
                const empCount = (c.m202411_job_code || 0).toLocaleString();
                const escapedName = c.company_name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                div.innerHTML = `<div class="company-name">${escapeHtml(c.company_name)}</div><div class="company-meta"><span>${empCount}명</span></div>`;
                div.addEventListener('click', () => showDetail(c.business_no, c.company_name, c.company_name + '|' + c.business_no));
                fragment.appendChild(div);
            }

            container.innerHTML = '';
            container.appendChild(fragment);

            const totalPages = Math.ceil(filteredCompanies.length / PAGE_SIZE);
            if (totalPages > 1) {
                const pagDiv = document.createElement('div');
                pagDiv.className = 'pagination';
                const pages = [];
                for (let i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                        pages.push(i);
                    } else if (pages[pages.length - 1] !== '...') {
                        pages.push('...');
                    }
                }
                pages.forEach(p => {
                    if (p === '...') {
                        const span = document.createElement('span');
                        span.style.cssText = 'padding:8px 4px;color:#666;';
                        span.textContent = '\u2026';
                        pagDiv.appendChild(span);
                    } else {
                        const btn = document.createElement('button');
                        btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
                        btn.textContent = p;
                        btn.addEventListener('click', () => { currentPage = p; renderSearchResults(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
                        pagDiv.appendChild(btn);
                    }
                });
                container.appendChild(pagDiv);
            }
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function showDetail(businessNo, companyName, key) {
            document.getElementById('companyTitle').textContent = companyName;
            document.getElementById('detailPanel').classList.add('active');

            if (companyCache[key]) {
                displayDetail(companyCache[key]);
                return;
            }

            const row = companyIndex.get(key);
            if (row) {
                companyCache[key] = row;
                displayDetail(row);
            } else {
                alert('상세 데이터를 찾을 수 없습니다.');
            }
        }

        function displayDetail(row) {
            const monthly = [];
            let totalHires = 0, totalSep = 0;

            for (let i = 0; i < MONTHS.length; i++) {
                const m = MONTHS[i];
                const jobCode = row['m' + m + '_job_code'] || 0;
                const annualSalary = row['m' + m + '_annual_salary'] || 0;
                const newHires = row['m' + m + '_new_hires'] || 0;
                const separations = row['m' + m + '_separations'] || 0;
                const { yearly, monthly: monthlyVal } = calcSalary(annualSalary, jobCode);

                totalHires += newHires;
                totalSep += separations;

                monthly.push({
                    month: MONTH_LABELS[m],
                    job_code: jobCode,
                    new_hires: newHires,
                    separations: separations,
                    yearly: yearly,
                    monthly: monthlyVal
                });
            }

            const latest = monthly[monthly.length - 1];
            document.getElementById('statEmployees').textContent = latest.job_code ? latest.job_code.toLocaleString() : '-';
            document.getElementById('statSalary').textContent = latest.yearly ? Math.round(latest.yearly / 10000).toLocaleString() : '-';
            document.getElementById('statMonthly').textContent = latest.monthly ? Math.round(latest.monthly / 10000).toLocaleString() : '-';

            const stability = totalHires + totalSep > 0 ? (totalHires / (totalHires + totalSep) * 5).toFixed(1) : '-';
            document.getElementById('statStability').textContent = stability + ' / 5.0';

            renderCharts(monthly);
            renderTable(monthly);

            document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth' });
        }

        function calcSalary(annualSalary, jobCode) {
            if (!annualSalary || !jobCode || jobCode === 0) return { yearly: 0, monthly: 0 };
            const perPerson = annualSalary / jobCode;
            const monthlyVal = (perPerson / 9) * 100;
            const yearly = monthlyVal * 12;
            return { yearly: Math.round(yearly), monthly: Math.round(monthlyVal) };
        }

        function renderCharts(monthly) {
            const labels = monthly.map(m => m.month);

            if (employeeChart) employeeChart.destroy();
            if (salaryChart) salaryChart.destroy();
            if (hireChart) hireChart.destroy();

            const chartDefaults = {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888' } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888' } }
                }
            };

            employeeChart = new Chart(document.getElementById('employeeChart'), {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: '직원수',
                        data: monthly.map(m => m.job_code),
                        borderColor: '#ff6b35',
                        backgroundColor: 'rgba(255, 107, 53, 0.1)',
                        tension: 0.3,
                        fill: true,
                        pointRadius: 3
                    }]
                },
                options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, beginAtZero: false } } }
            });

            salaryChart = new Chart(document.getElementById('salaryChart'), {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: '평균연봉(만원)',
                        data: monthly.map(m => m.yearly ? Math.round(m.yearly / 10000) : 0),
                        borderColor: '#38ef7d',
                        backgroundColor: 'rgba(56, 239, 125, 0.1)',
                        tension: 0.3,
                        fill: true,
                        pointRadius: 3
                    }]
                },
                options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, beginAtZero: false } } }
            });

            hireChart = new Chart(document.getElementById('hireChart'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        { label: '신규 채용', data: monthly.map(m => m.new_hires), backgroundColor: '#11998e', borderRadius: 4 },
                        { label: '퇴사자', data: monthly.map(m => m.separations), backgroundColor: '#e63946', borderRadius: 4 }
                    ]
                },
                options: {
                    ...chartDefaults,
                    plugins: { legend: { display: true, position: 'top', labels: { color: '#888' } } },
                    scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, beginAtZero: true } }
                }
            });
        }

        function renderTable(monthly) {
            const tbody = document.querySelector('#dataTable tbody');
            const rows = monthly.slice().reverse().map(m => {
                const monthlyDisplay = m.monthly ? Math.round(m.monthly / 10000).toLocaleString() + '만원' : '-';
                const yearlyDisplay = m.yearly ? Math.round(m.yearly / 10000).toLocaleString() + '만원' : '-';
                return `<tr><td>${m.month}</td><td>${m.job_code ? m.job_code.toLocaleString() : '-'}</td><td style="color:#11998e">+${(m.new_hires || 0).toLocaleString()}</td><td style="color:#e63946">-${(m.separations || 0).toLocaleString()}</td><td>${monthlyDisplay}</td><td>${yearlyDisplay}</td></tr>`;
            }).join('');
            tbody.innerHTML = rows;
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('active');
        }

        document.getElementById('searchBtn').addEventListener('click', () => {
            clearTimeout(searchDebounceTimer);
            performSearch();
        });

        const keywordInput = document.getElementById('keyword');
        keywordInput.addEventListener('input', function() {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                if (this.value.trim().length > 0) performSearch();
            }, 300);
        });

        keywordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                clearTimeout(searchDebounceTimer);
                performSearch();
            }
        });

        document.getElementById('closeBtn').addEventListener('click', closeDetail);

        document.getElementById('detailPanel').addEventListener('click', function(e) {
            if (e.target === this) closeDetail();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeDetail();
        });

        init();
    </script>
</body>
</html>
